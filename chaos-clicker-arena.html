<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chaos Clicker Arena</title>
<style>
@font-face { font-family: 'ArcadeFallback'; src: local('Courier New'); }
:root{
  --bg-void:#0b0710;
  --bg-panel:#150c22;
  --bg-panel-2:#1d1130;
  --line:#3a2258;
  --magenta:#ff2fb0;
  --magenta-dim:#8c2168;
  --lime:#c6ff3d;
  --cyan:#38f2ff;
  --amber:#ffb020;
  --violet:#8b5cf6;
  --text:#f1e9ff;
  --text-dim:#a996c9;
  --common:#9aa0a6;
  --rare:#38b6ff;
  --epic:#b24bf3;
  --legendary:#ffb020;
  --danger:#ff4d6d;
  --font-display:'Press Start 2P','ArcadeFallback',monospace;
  --font-body:'Share Tech Mono','ArcadeFallback',monospace;
}
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg-void);color:var(--text);font-family:var(--font-body);min-height:100vh;}
body{
  background:
    radial-gradient(ellipse at 20% -10%, rgba(139,92,246,0.25), transparent 45%),
    radial-gradient(ellipse at 90% 10%, rgba(255,47,176,0.18), transparent 40%),
    var(--bg-void);
  min-height:100vh;
  position:relative;
  overflow-x:hidden;
}
.crt-overlay{
  pointer-events:none;
  position:fixed; inset:0; z-index:999;
  background:repeating-linear-gradient(
    to bottom, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px,
    transparent 1px, transparent 3px);
  mix-blend-mode:overlay;
  opacity:0.5;
}
.crt-overlay::after{
  content:'';
  position:absolute; inset:0;
  background:radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.55) 100%);
}
#app{max-width:1100px;margin:0 auto;padding:14px 14px 60px;position:relative;}

/* ---------- Header ---------- */
.topbar{
  background:linear-gradient(180deg, var(--bg-panel-2), var(--bg-panel));
  border:2px solid var(--line);
  border-radius:10px;
  padding:14px 18px;
  margin-bottom:12px;
  box-shadow:0 0 0 1px rgba(255,47,176,0.08), 0 10px 30px rgba(0,0,0,0.5);
  display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;
}
.brand{
  font-family:var(--font-display);
  font-size:13px;
  color:var(--magenta);
  text-shadow:0 0 8px rgba(255,47,176,0.7), 0 0 20px rgba(255,47,176,0.35);
  letter-spacing:1px;
}
.brand small{display:block;font-family:var(--font-body);color:var(--text-dim);font-size:11px;margin-top:4px;letter-spacing:2px;}
.stat-strip{display:flex;gap:10px;flex-wrap:wrap;}
.pill{
  background:rgba(0,0,0,0.35);
  border:1px solid var(--line);
  border-radius:8px;
  padding:8px 12px;
  font-size:14px;
  display:flex; align-items:center; gap:6px;
  min-width:92px;
  justify-content:center;
}
.pill b{color:var(--lime);}
.pill.gems b{color:var(--cyan);}
.pill.ess b{color:var(--amber);}

/* ---------- Tabs ---------- */
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.tab-btn{
  font-family:var(--font-display);
  font-size:9px;
  letter-spacing:1px;
  background:var(--bg-panel);
  border:2px solid var(--line);
  border-bottom-width:4px;
  color:var(--text-dim);
  padding:10px 12px;
  border-radius:6px;
  cursor:pointer;
  transition:transform .08s ease, color .15s ease, border-color .15s ease;
}
.tab-btn:hover{color:var(--text);border-color:var(--magenta-dim);}
.tab-btn.active{
  color:var(--bg-void);
  background:var(--lime);
  border-color:#7fae1e;
  box-shadow:0 0 18px rgba(198,255,61,0.45);
}
.tab-btn:active{transform:translateY(2px);border-bottom-width:2px;}

/* ---------- Panels ---------- */
.panel{
  background:var(--bg-panel);
  border:2px solid var(--line);
  border-radius:10px;
  padding:18px;
  margin-bottom:14px;
  box-shadow:0 8px 24px rgba(0,0,0,0.4);
}
.panel-title{
  font-family:var(--font-display);
  font-size:12px;
  color:var(--cyan);
  margin-bottom:14px;
  letter-spacing:1px;
  text-shadow:0 0 10px rgba(56,242,255,0.4);
}

/* ---------- Battle ---------- */
.battle-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;}
@media(max-width:760px){.battle-grid{grid-template-columns:1fr;}}
.arena{
  position:relative;
  text-align:center;
  padding:20px 16px 26px;
  background:radial-gradient(ellipse at 50% 0%, rgba(255,47,176,0.12), transparent 60%), var(--bg-panel-2);
  border:2px solid var(--line);
  border-radius:10px;
  overflow:hidden;
}
.arena.shake{animation:shakeit .3s;}
@keyframes shakeit{
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-6px) rotate(-0.4deg);}
  40%{transform:translateX(6px) rotate(0.4deg);}
  60%{transform:translateX(-4px);}
  80%{transform:translateX(4px);}
}
.marquee{
  display:inline-block;
  font-family:var(--font-display);
  font-size:11px;
  color:var(--amber);
  background:rgba(0,0,0,0.4);
  border:1px solid var(--amber);
  padding:6px 14px;
  border-radius:20px;
  margin-bottom:14px;
  animation:flicker 1.6s infinite;
  letter-spacing:1px;
}
@keyframes flicker{
  0%,19%,21%,23%,80%,100%{opacity:1;}
  20%,22%{opacity:0.4;}
}
.enemy-emoji{font-size:64px;margin-bottom:6px;filter:drop-shadow(0 0 14px rgba(255,47,176,0.5));user-select:none;}
.enemy-name{font-family:var(--font-display);font-size:14px;margin-bottom:8px;color:var(--text);}
.rarity-tag{
  display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;
  font-weight:bold;margin-bottom:14px;text-transform:uppercase;letter-spacing:1px;border:1px solid;
}
.rarity-common{color:var(--common);border-color:var(--common);background:rgba(154,160,166,0.12);}
.rarity-rare{color:var(--rare);border-color:var(--rare);background:rgba(56,182,255,0.12);}
.rarity-epic{color:var(--epic);border-color:var(--epic);background:rgba(178,75,243,0.12);}
.rarity-legendary{color:var(--legendary);border-color:var(--legendary);background:rgba(255,176,32,0.14);}
.rarity-boss{color:#fff;border-color:var(--danger);background:rgba(255,77,109,0.18);}
.hp-wrap{
  width:100%;height:30px;background:rgba(0,0,0,0.5);border:2px solid var(--line);
  border-radius:8px;overflow:hidden;margin:10px 0 18px;position:relative;
}
.hp-fill{
  height:100%;background:linear-gradient(90deg,var(--magenta),var(--violet));
  transition:width .15s ease;
}
.hp-text{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:bold;text-shadow:0 1px 3px #000;
}
.attack-btn{
  font-family:var(--font-display);
  font-size:13px;
  background:linear-gradient(180deg, var(--magenta), #b8106f);
  color:#fff;
  border:2px solid #ff7ad0;
  border-bottom:6px solid #7a0d4d;
  padding:20px 30px;
  border-radius:10px;
  cursor:pointer;
  letter-spacing:1px;
  box-shadow:0 0 26px rgba(255,47,176,0.45);
  transition:transform .06s ease;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.attack-btn:active{transform:translateY(4px);border-bottom-width:2px;}
.fx-layer{position:absolute;inset:0;pointer-events:none;overflow:visible;}
.dmg-float{
  position:absolute;
  font-family:var(--font-display);
  font-size:14px;
  color:var(--lime);
  animation:floatup 0.9s ease-out forwards;
  white-space:nowrap;
}
.dmg-float.crit{color:var(--magenta);font-size:18px;}
.dmg-float.legendary{color:var(--amber);font-size:22px;}
@keyframes floatup{
  0%{opacity:1;transform:translateY(0) scale(1);}
  100%{opacity:0;transform:translateY(-70px) scale(1.25);}
}
.side-stats .row{
  display:flex;justify-content:space-between;padding:9px 4px;border-bottom:1px dashed var(--line);font-size:13px;
}
.side-stats .row:last-child{border-bottom:none;}
.side-stats .row span:last-child{color:var(--cyan);font-weight:bold;}
.loot-strip{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.loot-chip{
  background:rgba(198,255,61,0.08);border:1px solid var(--lime);color:var(--lime);
  padding:5px 10px;border-radius:6px;font-size:12px;animation:poplit .4s ease;
}
@keyframes poplit{0%{transform:scale(0.5);opacity:0;}100%{transform:scale(1);opacity:1;}}

/* ---------- Cards / grids ---------- */
.grid{display:grid;gap:12px;}
.grid.g2{grid-template-columns:repeat(auto-fit,minmax(260px,1fr));}
.grid.g3{grid-template-columns:repeat(auto-fit,minmax(170px,1fr));}

.card{
  background:var(--bg-panel-2);border:2px solid var(--line);border-radius:8px;padding:14px;
}
.card h4{font-family:var(--font-display);font-size:11px;color:var(--text);margin-bottom:8px;letter-spacing:0.5px;}
.card p{font-size:12px;color:var(--text-dim);margin-bottom:8px;line-height:1.5;}
.btn{
  font-family:var(--font-body);font-weight:bold;font-size:13px;
  background:var(--bg-panel);color:var(--cyan);border:2px solid var(--cyan);
  border-radius:6px;padding:9px 14px;cursor:pointer;transition:all .15s ease;
}
.btn:hover:not(:disabled){background:var(--cyan);color:var(--bg-void);box-shadow:0 0 16px rgba(56,242,255,0.5);}
.btn:disabled{opacity:0.35;cursor:not-allowed;}
.btn.magenta{color:var(--magenta);border-color:var(--magenta);}
.btn.magenta:hover:not(:disabled){background:var(--magenta);color:#fff;box-shadow:0 0 16px rgba(255,47,176,0.6);}
.btn.amber{color:var(--amber);border-color:var(--amber);}
.btn.amber:hover:not(:disabled){background:var(--amber);color:#241300;box-shadow:0 0 16px rgba(255,176,32,0.6);}
.btn.full{width:100%;}
.cost{color:var(--amber);font-weight:bold;}

.zone-card{
  background:var(--bg-panel-2);border:2px solid var(--line);border-radius:8px;padding:16px;text-align:center;cursor:pointer;
  transition:all .15s ease;position:relative;
}
.zone-card.active{border-color:var(--lime);box-shadow:0 0 18px rgba(198,255,61,0.3);}
.zone-card.locked{opacity:0.45;cursor:not-allowed;}
.zone-card:hover:not(.locked){transform:translateY(-3px);border-color:var(--magenta);}
.zone-emoji{font-size:34px;margin-bottom:6px;}
.zone-name{font-family:var(--font-display);font-size:10px;margin-bottom:6px;}
.zone-sub{font-size:11px;color:var(--text-dim);}

.pet-card{
  background:var(--bg-panel-2);border:2px solid var(--line);border-radius:8px;padding:14px;text-align:center;
}
.pet-emoji{font-size:38px;margin:4px 0;}
.pet-name{font-family:var(--font-display);font-size:9px;margin-bottom:6px;}
.pet-bonus{font-size:11px;color:var(--text-dim);line-height:1.5;}

.quest-item{
  background:var(--bg-panel-2);border-left:4px solid var(--lime);border-radius:6px;padding:14px;margin-bottom:10px;
}
.quest-title{font-weight:bold;margin-bottom:8px;font-size:13px;}
.qbar{background:rgba(0,0,0,0.4);height:10px;border-radius:5px;overflow:hidden;margin-bottom:6px;}
.qbar-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--lime));transition:width .2s ease;}
.quest-reward{font-size:11px;color:var(--amber);}

.ach-badge{
  background:var(--bg-panel-2);border:2px solid var(--line);border-radius:8px;padding:12px;text-align:center;transition:all .2s ease;
}
.ach-badge.unlocked{border-color:var(--amber);box-shadow:0 0 16px rgba(255,176,32,0.35);}
.ach-badge.locked{opacity:0.35;}
.ach-icon{font-size:28px;margin-bottom:6px;}
.ach-name{font-size:10px;font-weight:bold;}
.ach-req{font-size:9px;color:var(--text-dim);margin-top:4px;}

/* ---------- Modal / toast ---------- */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(4,2,10,0.88);z-index:1500;
  align-items:center;justify-content:center;padding:20px;
}
.modal-overlay.show{display:flex;}
.modal-box{
  background:var(--bg-panel);border:2px solid var(--magenta);border-radius:12px;padding:34px;max-width:440px;text-align:center;
  box-shadow:0 0 50px rgba(255,47,176,0.4);animation:popin .25s ease;
}
@keyframes popin{0%{transform:scale(0.8);opacity:0;}100%{transform:scale(1);opacity:1;}}
.modal-title{font-family:var(--font-display);font-size:16px;color:var(--amber);margin-bottom:16px;}
.modal-text{font-size:14px;margin:10px 0;color:var(--text-dim);line-height:1.6;}
.modal-text b{color:var(--lime);}

#toastContainer{position:fixed;top:14px;right:14px;z-index:2000;display:flex;flex-direction:column;gap:8px;}
.toast{
  background:var(--bg-panel);border:2px solid var(--cyan);border-radius:8px;padding:12px 16px;font-size:12px;
  min-width:220px;box-shadow:0 6px 18px rgba(0,0,0,0.5);animation:toastin .3s ease, toastout .3s ease 3.2s forwards;
}
.toast.gold{border-color:var(--amber);}
.toast.ach{border-color:var(--magenta);}
@keyframes toastin{0%{transform:translateX(120%);opacity:0;}100%{transform:translateX(0);opacity:1;}}
@keyframes toastout{0%{opacity:1;}100%{opacity:0;transform:translateX(120%);}}

.savebar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:14px;}
textarea.savecode{
  width:100%;background:#000;color:var(--lime);border:1px solid var(--line);border-radius:6px;padding:8px;
  font-family:var(--font-body);font-size:11px;height:70px;margin-top:8px;
}
.footer-note{font-size:11px;color:var(--text-dim);text-align:center;margin-top:20px;}
</style>
</head>
<body>
<div class="crt-overlay"></div>
<div id="app">

  <div class="topbar">
    <div class="brand">CHAOS CLICKER ARENA<small>tap. loot. ascend.</small></div>
    <div class="stat-strip">
      <div class="pill">💰 <b id="hdGold">0</b></div>
      <div class="pill gems">💎 <b id="hdGems">0</b></div>
      <div class="pill ess">✨ <b id="hdEssence">0</b></div>
      <div class="pill">🗺️ <b id="hdZone">Starter Fields</b></div>
    </div>
  </div>

  <div class="tabs" id="tabs"></div>
  <div id="content"></div>

  <div class="footer-note">Autosaves every 15s. Progress also keeps ticking while this tab is open.</div>
</div>

<div id="toastContainer"></div>
<div id="modalRoot"></div>

<script>
/* =========================================================
   CHAOS CLICKER ARENA — self-contained idle/clicker RPG
   ========================================================= */

const ZONES = [
  {name:'Starter Fields', emoji:'🌾', monsters:['Grass Slime','Field Rat','Wild Boarling'], monsterEmoji:['🟢','🐀','🐗']},
  {name:'Whispering Desert', emoji:'🏜️', monsters:['Sand Wraith','Scorpion King','Dune Stalker'], monsterEmoji:['👻','🦂','🐫']},
  {name:'Molten Volcano', emoji:'🌋', monsters:['Magma Imp','Ash Golem','Cinder Wyrm'], monsterEmoji:['👹','🗿','🐉']},
  {name:'Orbital Station', emoji:'🚀', monsters:['Rogue Drone','Void Marine','Glitch Sentinel'], monsterEmoji:['🛸','👾','🤖']},
  {name:'Abyssal City', emoji:'🌊', monsters:['Kraken Spawn','Drowned Sailor','Pearl Serpent'], monsterEmoji:['🐙','🧟','🐍']},
  {name:'Candy Kingdom', emoji:'🍭', monsters:['Gummy Golem','Sour Sprite','Caramel Colossus'], monsterEmoji:['🍬','🧚','🍮']},
  {name:'Ancient Ruins', emoji:'⚱️', monsters:['Cursed Statue','Sand Pharaoh','Tomb Wisp'], monsterEmoji:['🗿','🏺','💀']},
  {name:'Neon Metropolis', emoji:'🌆', monsters:['Hacker Bot','Chrome Enforcer','AI Overmind'], monsterEmoji:['🤖','🦾','🧠']},
  {name:'Shadow Realm', emoji:'👻', monsters:['Nightmare Wisp','Void Reaper','The Hollow King'], monsterEmoji:['😈','☠️','👑']},
];

const PET_TYPES = {
  'Dog':{emoji:'🐕', dmg:0.05, crit:1, gold:0.03},
  'Dragon':{emoji:'🐉', dmg:0.10, crit:2, gold:0.05},
  'Alien':{emoji:'👽', dmg:0.08, crit:3, gold:0.04},
  'Phoenix':{emoji:'🔥', dmg:0.12, crit:2, gold:0.08},
  'Robot':{emoji:'🤖', dmg:0.07, crit:4, gold:0.06},
  'Shadow Beast':{emoji:'👹', dmg:0.15, crit:5, gold:0.10},
  'Unicorn':{emoji:'🦄', dmg:0.09, crit:3, gold:0.12},
  'Kraken':{emoji:'🐙', dmg:0.11, crit:2, gold:0.07},
};
const PET_RARITY_MULT = {Common:1, Rare:1.5, Epic:2.5, Legendary:4};
const RARITY_ORDER = ['Common','Rare','Epic','Legendary'];

const UPGRADE_DEFS = {
  clickDamage: {label:'Sharper Claws', desc:'+3 flat click damage per level.', baseCost:10, growth:1.15},
  critChance: {label:'Killer Instinct', desc:'+1% crit chance per level (cap 60%).', baseCost:25, growth:1.18},
  critMult: {label:'Heavy Strikes', desc:'+0.15x crit damage multiplier per level.', baseCost:40, growth:1.20},
  autoDPS: {label:'Arena Turret', desc:'+2 automatic damage/sec per level.', baseCost:50, growth:1.17},
  goldMult: {label:'Golden Touch', desc:'+5% gold from all kills per level.', baseCost:60, growth:1.19},
};

const ACHIEVEMENTS = [
  {id:'k1', name:'First Blood', emoji:'⚔️', req:'Defeat 1 enemy', check:s=>s.totalKills>=1},
  {id:'k100', name:'Monster Hunter', emoji:'💯', req:'Defeat 100 enemies', check:s=>s.totalKills>=100},
  {id:'k1000', name:'Slayer', emoji:'🔥', req:'Defeat 1,000 enemies', check:s=>s.totalKills>=1000},
  {id:'k10000', name:'Legendary Slayer', emoji:'🌟', req:'Defeat 10,000 enemies', check:s=>s.totalKills>=10000},
  {id:'b1', name:'Boss Buster', emoji:'👑', req:'Defeat 1 boss', check:s=>s.totalBossKills>=1},
  {id:'b25', name:'Boss Master', emoji:'🏆', req:'Defeat 25 bosses', check:s=>s.totalBossKills>=25},
  {id:'p1', name:'Egg-cellent', emoji:'🥚', req:'Hatch your first pet', check:s=>s.pets.length>=1},
  {id:'p10', name:'Menagerie', emoji:'🐾', req:'Own 10 pets', check:s=>s.pets.length>=10},
  {id:'g10k', name:'Small Fortune', emoji:'💰', req:'Earn 10,000 lifetime gold', check:s=>s.lifetimeGold>=10000},
  {id:'g1m', name:'Tycoon', emoji:'🏦', req:'Earn 1,000,000 lifetime gold', check:s=>s.lifetimeGold>=1000000},
  {id:'gem50', name:'Gem Collector', emoji:'💎', req:'Hold 50 gems at once', check:s=>s.gems>=50},
  {id:'z5', name:'Explorer', emoji:'🗺️', req:'Unlock 5 zones', check:s=>s.zoneIndex>=4},
  {id:'zall', name:'World Conqueror', emoji:'🌍', req:'Unlock every zone', check:s=>s.zoneIndex>=ZONES.length-1},
  {id:'presti', name:'Ascended', emoji:'✨', req:'Prestige once', check:s=>s.prestigeCount>=1},
];

const QUEST_TEMPLATES = [
  {type:'kills', gen:()=>50+Math.floor(Math.random()*150), label:n=>`Defeat ${n} enemies`, reward:{gold:1}},
  {type:'crits', gen:()=>20+Math.floor(Math.random()*60), label:n=>`Land ${n} critical hits`, reward:{gold:1}},
  {type:'bosses', gen:()=>1+Math.floor(Math.random()*4), label:n=>`Defeat ${n} bosses`, reward:{gems:1}},
  {type:'gold', gen:()=>500+Math.floor(Math.random()*4500), label:n=>`Earn ${n} gold`, reward:{crate:'Common'}},
  {type:'clicks', gen:()=>200+Math.floor(Math.random()*400), label:n=>`Click ${n} times`, reward:{gold:1}},
];

function defaultState(){
  return {
    gold:0, gems:0, essence:0, lifetimeGold:0, prestigeCount:0,
    totalClicks:0, totalKills:0, totalCrits:0, totalBossKills:0,
    zoneIndex:0, killsInZone:0,
    enemy:null,
    upgrades:{clickDamage:0, critChance:0, critMult:0, autoDPS:0, goldMult:0},
    pets:[], eggs:0,
    unlockedZones:[0],
    quests:[],
    crates:{Common:0, Rare:0, Epic:0, Legendary:0},
    achievements:{},
    dailyStreak:0, lastDailyClaim:0,
    startTime:Date.now(), lastSaveTime:Date.now(),
  };
}

let S = defaultState();
let currentTab='battle';
let unlockCosts = ZONES.map((z,i)=> i===0?0:Math.floor(500*Math.pow(3.2,i-1)));

/* ---------- persistence ---------- */
function saveGame(silent){
  S.lastSaveTime=Date.now();
  const json=JSON.stringify(S);
  try{ localStorage.setItem('chaosClickerSave', json); }catch(e){ /* sandbox: localStorage unavailable */ }
  window.__lastSaveBlob = json;
  if(!silent) toast('Game saved.', 'gold');
}
function loadGame(){
  let raw=null;
  try{ raw=localStorage.getItem('chaosClickerSave'); }catch(e){}
  if(!raw && window.__lastSaveBlob) raw=window.__lastSaveBlob;
  if(!raw) return false;
  try{
    const data=JSON.parse(raw);
    S=Object.assign(defaultState(), data);
    if(!S.enemy) spawnEnemy();
    return true;
  }catch(e){ return false; }
}
function applyOfflineProgress(){
  if(!S.lastSaveTime) return;
  const elapsedSec = Math.min((Date.now()-S.lastSaveTime)/1000, 4*3600);
  if(elapsedSec<30) return;
  const dps=getAutoDPS();
  if(dps<=0) return;
  const estKills = Math.max(0, Math.floor((dps*elapsedSec) / Math.max(1,S.enemy?S.enemy.maxHp:20)));
  if(estKills<=0) return;
  const avgGold = Math.floor((S.enemy?S.enemy.goldReward:5) * getGoldMult());
  const earned = Math.min(estKills, 20000) * avgGold;
  S.gold+=earned; S.lifetimeGold+=earned;
  S.totalKills += Math.min(estKills, 20000);
  showModal('Welcome Back!', `Your turret kept fighting while you were away.<br><br>Estimated kills: <b>${fmt(Math.min(estKills,20000))}</b><br>Gold earned: <b>${fmt(earned)}</b>`, [{text:'Nice!', action:()=>closeModal()}]);
}

/* ---------- helpers ---------- */
function fmt(n){
  n=Math.floor(n);
  if(n<1000) return ''+n;
  const units=['K','M','B','T','Qa','Qi'];
  let u=-1; let v=n;
  while(v>=1000 && u<units.length-1){ v/=1000; u++; }
  return v.toFixed(v<10?2:v<100?1:0)+units[u];
}
function toast(msg, cls){
  const el=document.createElement('div');
  el.className='toast'+(cls?' '+cls:'');
  el.textContent=msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(()=>el.remove(), 3600);
}
function showModal(title, html, buttons){
  const root=document.getElementById('modalRoot');
  root.innerHTML=`<div class="modal-overlay show"><div class="modal-box">
    <div class="modal-title">${title}</div>
    <div class="modal-text">${html}</div>
    <div style="margin-top:18px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
      ${buttons.map((b,i)=>`<button class="btn magenta" onclick="__modalBtn(${i})">${b.text}</button>`).join('')}
    </div>
  </div></div>`;
  window.__modalButtons = buttons;
}
function __modalBtn(i){ window.__modalButtons[i].action(); }
function closeModal(){ document.getElementById('modalRoot').innerHTML=''; }

/* ---------- derived stats ---------- */
function prestigeMult(){ return 1+S.essence*0.02; }
function petSum(key){ return S.pets.reduce((s,p)=> s+ (PET_TYPES[p.type][key]*PET_RARITY_MULT[p.rarity]), 0); }
function getClickDamage(){
  let dmg = 5 + S.upgrades.clickDamage*3;
  dmg *= (1+petSum('dmg'));
  dmg *= prestigeMult();
  return dmg;
}
function getCritChance(){ return Math.min(60, 5+S.upgrades.critChance*1+petSum('crit')); }
function getCritMult(){ return 2+S.upgrades.critMult*0.15; }
function getAutoDPS(){
  let d = S.upgrades.autoDPS*2;
  d *= (1+petSum('dmg')*0.5);
  d *= prestigeMult();
  return d;
}
function getGoldMult(){
  let m = 1+S.upgrades.goldMult*0.05;
  m *= (1+petSum('gold'));
  m *= prestigeMult();
  return m;
}
function upgradeCost(key){
  const def=UPGRADE_DEFS[key];
  const lvl=S.upgrades[key];
  return Math.floor(def.baseCost*Math.pow(def.growth, lvl));
}

/* ---------- enemy / combat ---------- */
function pickRarity(zoneIndex){
  const t = zoneIndex/(ZONES.length-1);
  const weights = {
    Common: 70-40*t, Rare: 22+8*t, Epic: 7+18*t, Legendary: 1+14*t
  };
  const total = Object.values(weights).reduce((a,b)=>a+b,0);
  let r = Math.random()*total;
  for(const k of RARITY_ORDER){ if(r<weights[k]) return k; r-=weights[k]; }
  return 'Common';
}
const RARITY_HP_MULT = {Common:1, Rare:1.8, Epic:3.2, Legendary:6};
const RARITY_GEM_CHANCE = {Common:0.01, Rare:0.03, Epic:0.08, Legendary:0.2};

function spawnEnemy(){
  const zi=S.zoneIndex;
  const zone=ZONES[zi];
  const idx=Math.floor(Math.random()*zone.monsters.length);
  const isBoss = S.killsInZone>0 && S.killsInZone%10===9;
  const rarity = isBoss ? 'Legendary' : pickRarity(zi);
  const baseHP = 18*Math.pow(1.55, zi);
  let hp = Math.floor(baseHP*RARITY_HP_MULT[rarity]*(0.85+Math.random()*0.3));
  if(isBoss) hp*=4;
  const goldReward = Math.max(1, Math.floor(hp*0.12*(1+zi*0.05)*(isBoss?1.6:1)));
  S.enemy = {
    name: isBoss ? `${zone.monsters[idx]} (BOSS)` : zone.monsters[idx],
    emoji: zone.monsterEmoji[idx],
    maxHp: hp, hp: hp,
    rarity, isBoss,
    goldReward,
    gemChance: isBoss ? 1 : RARITY_GEM_CHANCE[rarity],
  };
}

let lastAttackWasCrit=false;
function clickAttack(){
  S.totalClicks++;
  updateQuestProgress('clicks', 1);
  let dmg=getClickDamage();
  let isCrit=false, isLegendary=false;
  const roll=Math.random()*100;
  const cc=getCritChance();
  if(roll<cc*0.15){ dmg*=getCritMult()*2.2; isLegendary=true; isCrit=true; }
  else if(roll<cc){ dmg*=getCritMult(); isCrit=true; }
  if(isCrit){ S.totalCrits++; updateQuestProgress('crits',1); }
  dealDamage(dmg, isCrit, isLegendary, true);
}
function dealDamage(dmg, isCrit, isLegendary, fromClick){
  if(!S.enemy) return;
  S.enemy.hp -= dmg;
  spawnFloatText(dmg, isCrit, isLegendary);
  if(isLegendary || (S.enemy.isBoss && fromClick)) shakeArena();
  if(S.enemy.hp<=0){ killEnemy(); }
  else { renderHealthOnly(); }
}
function spawnFloatText(dmg, isCrit, isLegendary){
  const layer=document.getElementById('fxLayer');
  if(!layer) return;
  const span=document.createElement('div');
  span.className='dmg-float'+(isLegendary?' legendary':isCrit?' crit':'');
  span.textContent=(isLegendary?'✨ ':isCrit?'⚡ ':'')+fmt(dmg);
  const x=40+Math.random()*20;
  span.style.left=x+'%';
  span.style.top=(30+Math.random()*15)+'%';
  layer.appendChild(span);
  setTimeout(()=>span.remove(), 900);
}
function shakeArena(){
  const arena=document.getElementById('arena');
  if(!arena) return;
  arena.classList.add('shake');
  setTimeout(()=>arena.classList.remove('shake'), 300);
}
function killEnemy(){
  const e=S.enemy;
  const goldMult=getGoldMult();
  const gained=Math.floor(e.goldReward*goldMult);
  S.gold+=gained; S.lifetimeGold+=gained;
  S.totalKills++;
  updateQuestProgress('kills',1);
  updateQuestProgress('gold', gained);
  if(Math.random()<e.gemChance){ S.gems++; toast('💎 +1 Gem!', ''); }
  if(e.isBoss){
    S.totalBossKills++;
    updateQuestProgress('bosses',1);
    S.crates.Common++;
    toast(`👑 Boss defeated! +${fmt(gained)} gold, +1 Common Crate`, 'gold');
    const nextIdx=S.zoneIndex+1;
    if(nextIdx<ZONES.length && !S.unlockedZones.includes(nextIdx)){
      S.unlockedZones.push(nextIdx);
      toast(`🗺️ New zone unlocked: ${ZONES[nextIdx].name}!`, 'gold');
    }
    S.killsInZone=0;
  } else {
    S.killsInZone++;
  }
  checkAchievements();
  refreshQuestsIfComplete();
  spawnEnemy();
  render();
}

/* ---------- upgrades ---------- */
function buyUpgrade(key){
  const cost=upgradeCost(key);
  if(S.gold<cost) return;
  if(key==='critChance' && getCritChance()>=60) return;
  S.gold-=cost;
  S.upgrades[key]++;
  render();
}

/* ---------- pets ---------- */
function purchaseEgg(){
  const cost=200+S.pets.length*15;
  if(S.gold<cost) return;
  S.gold-=cost; S.eggs++;
  render();
}
function hatchEgg(){
  if(S.eggs<1) return;
  S.eggs--;
  const types=Object.keys(PET_TYPES);
  const type=types[Math.floor(Math.random()*types.length)];
  const roll=Math.random()*100;
  let rarity='Common';
  if(roll<2) rarity='Legendary'; else if(roll<12) rarity='Epic'; else if(roll<40) rarity='Rare';
  S.pets.push({id:Date.now()+Math.random(), type, rarity});
  checkAchievements();
  showModal('New Pet!', `You hatched a <b>${rarity} ${type}</b> ${PET_TYPES[type].emoji}`, [{text:'Awesome!', action:closeModal}]);
  render();
}

/* ---------- zones ---------- */
function tryUnlockZone(i){
  if(S.unlockedZones.includes(i)) { travelToZone(i); return; }
  const cost=unlockCosts[i];
  if(S.gold<cost) { toast('Not enough gold to unlock this zone.', ''); return; }
  S.gold-=cost;
  S.unlockedZones.push(i);
  travelToZone(i);
}
function travelToZone(i){
  S.zoneIndex=i; S.killsInZone=0;
  spawnEnemy();
  render();
}

/* ---------- crates ---------- */
function openCrate(type){
  if(S.crates[type]<=0) return;
  S.crates[type]--;
  const rewards={
    Common:{gold:100,gems:0,egg:0},
    Rare:{gold:400,gems:1,egg:0},
    Epic:{gold:1200,gems:2,egg:1},
    Legendary:{gold:5000,gems:5,egg:1},
  };
  const r=rewards[type];
  S.gold+=r.gold; S.lifetimeGold+=r.gold; S.gems+=r.gems; S.eggs+=r.egg;
  checkAchievements();
  showModal(`${type} Crate Opened!`, `+${fmt(r.gold)} 💰 &nbsp; +${r.gems} 💎 ${r.egg?'&nbsp; +1 🥚':''}`, [{text:'Nice!', action:closeModal}]);
  render();
}

/* ---------- daily ---------- */
function canClaimDaily(){
  if(!S.lastDailyClaim) return true;
  return (Date.now()-S.lastDailyClaim) >= 24*3600*1000;
}
function hoursUntilDaily(){
  const next=S.lastDailyClaim+24*3600*1000;
  return Math.max(0, Math.ceil((next-Date.now())/3600000));
}
function claimDaily(){
  if(!canClaimDaily()) return;
  if(S.lastDailyClaim && (Date.now()-S.lastDailyClaim) > 48*3600*1000) S.dailyStreak=0;
  S.dailyStreak++;
  const day=((S.dailyStreak-1)%7)+1;
  const rewards=[
    {gold:200},{gold:500},{gold:0,egg:1},{gold:800},{gold:0,crate:'Rare'},{gold:1500},{gold:0,gems:3,crate:'Epic'}
  ];
  const r=rewards[day-1];
  let msg=[];
  if(r.gold){ S.gold+=r.gold; S.lifetimeGold+=r.gold; msg.push(`+${fmt(r.gold)} 💰`); }
  if(r.gems){ S.gems+=r.gems; msg.push(`+${r.gems} 💎`); }
  if(r.egg){ S.eggs+=r.egg; msg.push(`+${r.egg} 🥚`); }
  if(r.crate){ S.crates[r.crate]++; msg.push(`+1 ${r.crate} Crate`); }
  S.lastDailyClaim=Date.now();
  showModal(`Daily Reward — Day ${day}`, msg.join(' &nbsp; '), [{text:'Claim!', action:closeModal}]);
  render();
}

/* ---------- quests ---------- */
function newQuest(){
  const t=QUEST_TEMPLATES[Math.floor(Math.random()*QUEST_TEMPLATES.length)];
  const target=t.gen();
  return {id:Date.now()+Math.random(), type:t.type, target, progress:0, label:t.label(target), reward:t.reward, completed:false};
}
function ensureQuests(){
  while(S.quests.length<3) S.quests.push(newQuest());
}
function updateQuestProgress(type, amount){
  S.quests.forEach(q=>{ if(q.type===type && !q.completed){ q.progress=Math.min(q.target, q.progress+amount); } });
}
function refreshQuestsIfComplete(){ /* claiming happens via button; nothing auto here */ }
function claimQuest(id){
  const q=S.quests.find(q=>q.id===id);
  if(!q || q.progress<q.target || q.completed) return;
  q.completed=true;
  if(q.reward.gold){ const g=Math.floor(q.target*2); S.gold+=g; S.lifetimeGold+=g; toast(`Quest complete! +${fmt(g)} 💰`, 'gold'); }
  if(q.reward.gems){ S.gems+=q.reward.gems; toast(`Quest complete! +${q.reward.gems} 💎`, 'gold'); }
  if(q.reward.crate){ S.crates[q.reward.crate]++; toast(`Quest complete! +1 ${q.reward.crate} Crate`, 'gold'); }
  S.quests = S.quests.filter(x=>x.id!==id);
  ensureQuests();
  render();
}

/* ---------- achievements ---------- */
function checkAchievements(){
  ACHIEVEMENTS.forEach(a=>{
    if(!S.achievements[a.id] && a.check(S)){
      S.achievements[a.id]=true;
      S.gold+=250; S.lifetimeGold+=250; S.crates.Rare++;
      toast(`🏆 Achievement unlocked: ${a.name}!`, 'ach');
    }
  });
}

/* ---------- prestige ---------- */
function canPrestige(){ return S.lifetimeGold>=50000; }
function essenceOnPrestige(){ return Math.floor(Math.sqrt(S.lifetimeGold/50000)); }
function doPrestige(){
  const gained=essenceOnPrestige();
  if(gained<1) return;
  showModal('Confirm Ascension', `Reset your gold, upgrades and zone progress to gain <b>+${gained} Essence</b> (permanent +${gained*2}% to all damage & gold, forever). Pets and achievements are kept.`, [
    {text:'Cancel', action:closeModal},
    {text:'Ascend!', action:()=>{
      S.essence+=gained; S.prestigeCount++;
      S.gold=0; S.lifetimeGold=0; S.zoneIndex=0; S.killsInZone=0; S.unlockedZones=[0];
      S.upgrades={clickDamage:0, critChance:0, critMult:0, autoDPS:0, goldMult:0};
      spawnEnemy();
      checkAchievements();
      closeModal();
      render();
    }}
  ]);
}

/* ---------- export / import ---------- */
function exportSave(){
  const code=btoa(unescape(encodeURIComponent(JSON.stringify(S))));
  const ta=document.getElementById('saveCodeBox');
  if(ta){ ta.value=code; ta.select(); }
}
function importSave(){
  const ta=document.getElementById('saveCodeBox');
  if(!ta || !ta.value.trim()) return;
  try{
    const data=JSON.parse(decodeURIComponent(escape(atob(ta.value.trim()))));
    S=Object.assign(defaultState(), data);
    if(!S.enemy) spawnEnemy();
    ensureQuests();
    saveGame(true);
    render();
    toast('Save imported!', 'gold');
  }catch(e){ toast('Invalid save code.', ''); }
}
function hardReset(){
  showModal('Reset Everything?', 'This permanently deletes all progress, including essence and pets. This cannot be undone.', [
    {text:'Cancel', action:closeModal},
    {text:'Delete Everything', action:()=>{
      try{ localStorage.removeItem('chaosClickerSave'); }catch(e){}
      window.__lastSaveBlob=null;
      S=defaultState();
      spawnEnemy(); ensureQuests();
      closeModal(); render();
    }}
  ]);
}

}

function renderAchievements(){
  return `<div class="panel"><div class="panel-title">FEATS</div>
  <div class="grid g3">
  ${ACHIEVEMENTS.map(a=>{
    const unlocked=!!S.achievements[a.id];
    return `<div class="ach-badge ${unlocked?'unlocked':'locked'}">
      <div class="ach-icon">${a.emoji}</div>
      <div class="ach-name">${a.name}</div>
      ${unlocked?'':`<div class="ach-req">${a.req}</div>`}
    </div>`;
  }).join('')}
  </div></div>`;
}

function renderPrestige(){
  const gained=essenceOnPrestige();
  return `<div class="panel"><div class="panel-title">ASCENSION</div>
  <p style="margin-bottom:10px;">Ascending resets your gold, zone progress and upgrades in exchange for permanent <b style="color:var(--amber);">Essence</b>: each point grants +2% damage and gold, forever. Pets and achievements are always kept.</p>
  <div class="grid g2" style="margin-bottom:16px;">
    <div class="card"><h4>Current Essence</h4><p style="font-size:22px;color:var(--amber);">${fmt(S.essence)}</p></div>
    <div class="card"><h4>Essence on Ascend</h4><p style="font-size:22px;color:var(--lime);">+${fmt(gained)}</p></div>
  </div>
  <button class="btn magenta full" onclick="doPrestige()" ${gained<1?'disabled':''}>${gained<1?'Need '+fmt(50000-S.lifetimeGold)+' more lifetime gold':'Ascend Now'}</button>
  </div>
  <div class="panel"><div class="panel-title">LIFETIME STATS</div>
    <div class="side-stats">
      <div class="row"><span>Total Clicks</span><span>${fmt(S.totalClicks)}</span></div>
      <div class="row"><span>Enemies Defeated</span><span>${fmt(S.totalKills)}</span></div>
      <div class="row"><span>Bosses Defeated</span><span>${fmt(S.totalBossKills)}</span></div>
      <div class="row"><span>Critical Hits</span><span>${fmt(S.totalCrits)}</span></div>
      <div class="row"><span>Pets Collected</span><span>${S.pets.length}</span></div>
      <div class="row"><span>Times Ascended</span><span>${S.prestigeCount}</span></div>
    </div>
  </div>
  <div class="panel"><div class="panel-title">SAVE DATA</div>
    <div class="savebar">
      <button class="btn" onclick="saveGame(false)">💾 Save Now</button>
      <button class="btn" onclick="exportSave()">⬆ Export Code</button>
      <button class="btn" onclick="importSave()">⬇ Import Code</button>
      <button class="btn magenta" onclick="hardReset()">🗑 Reset Everything</button>
    </div>
    <textarea id="saveCodeBox" class="savecode" placeholder="Export generates a code here. Paste a code here then click Import to restore it."></textarea>
    <p style="margin-top:8px;font-size:11px;">Autosave uses your browser's local storage when available. If it's blocked in this view, use Export/Import to carry your progress between sessions — copy the code somewhere safe.</p>
  </div>`;
}

function render(){
  renderTabs();
  renderHeader();
  const map={
    battle:renderBattle, upgrades:renderUpgrades, zones:renderZones, pets:renderPets,
    quests:renderQuests, crates:renderCrates, achievements:renderAchievements, prestige:renderPrestige,
  };
  document.getElementById('content').innerHTML = map[currentTab]();
}

/* ---------- main loop ---------- */
function tick(){
  const dps=getAutoDPS();
  if(dps>0 && S.enemy){
    dealDamage(dps*0.25, false, false, false);
  }
}

function init(){
  const loaded=loadGame();
  if(!loaded){ S=defaultState(); }
  if(!S.enemy) spawnEnemy();
  ensureQuests();
  if(loaded) applyOfflineProgress();
  render();
  setInterval(tick, 250);
  setInterval(()=>saveGame(true), 15000);
  window.addEventListener('beforeunload', ()=>saveGame(true));
}
init();
</script>
</body>
</html>
